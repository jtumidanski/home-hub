---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: home-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      containers:
      - name: dashboard-service
        image: ghcr.io/jtumidanski/home-hub-dashboard-service:main
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_NAME
        - name: JWKS_URL
          value: "http://auth-service:8080/api/v1/auth/.well-known/jwks.json"
        - name: ACCOUNT_SERVICE_URL
          value: "http://account-service:8080"
        - name: INTERNAL_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: internal-service-token
              key: INTERNAL_SERVICE_TOKEN
              optional: true
        - name: BOOTSTRAP_SERVERS
          value: "kafka-broker.kafka.svc.cluster.local:9092"
        - name: EVENT_TOPIC_USER_LIFECYCLE
          value: "home-hub.user.lifecycle"
        - name: KAFKA_CONSUMER_GROUP
          value: "dashboard-service"
        - name: RETENTION_INTERVAL
          value: "6h"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: home-hub
spec:
  selector:
    app: dashboard-service
  ports:
  - protocol: TCP
    port: 8080
