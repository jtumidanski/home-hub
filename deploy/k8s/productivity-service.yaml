---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productivity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productivity-service
  template:
    metadata:
      labels:
        app: productivity-service
    spec:
      containers:
      - name: productivity-service
        image: ghcr.io/jtumidanski/home-hub-productivity-service:main
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_NAME
        - name: JWKS_URL
          value: "http://auth-service:8080/api/v1/auth/.well-known/jwks.json"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: productivity-service
spec:
  selector:
    app: productivity-service
  ports:
  - protocol: TCP
    port: 8080
