# Example Kubernetes Secrets for Home Hub
# Copy this file to secrets.yaml and fill in real values.
# DO NOT commit secrets.yaml to version control.
#
# To apply:
#   kubectl apply -f deploy/k8s/secrets.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: home-hub
type: Opaque
stringData:
  DB_HOST: "postgres.home"
  DB_PORT: "5432"
  DB_USER: "home_hub"
  DB_PASSWORD: "changeme"
  DB_NAME: "home_hub"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: home-hub
type: Opaque
stringData:
  # RSA private key in PEM format (single line with \n escapes)
  JWT_PRIVATE_KEY: ""
  OIDC_CLIENT_ID: ""
  OIDC_CLIENT_SECRET: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: calendar-secrets
  namespace: home-hub
type: Opaque
stringData:
  GOOGLE_CALENDAR_CLIENT_ID: ""
  GOOGLE_CALENDAR_CLIENT_SECRET: ""
  # 32-byte AES-256 key, base64 encoded
  # Generate with: openssl rand -base64 32
  CALENDAR_TOKEN_ENCRYPTION_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: package-secrets
  namespace: home-hub
type: Opaque
stringData:
  USPS_CLIENT_ID: ""
  USPS_CLIENT_SECRET: ""
  UPS_CLIENT_ID: ""
  UPS_CLIENT_SECRET: ""
  FEDEX_API_KEY: ""
  FEDEX_SECRET_KEY: ""
  # 32-byte AES-256 key, base64 encoded
  # Generate with: openssl rand -base64 32
  PACKAGE_TOKEN_ENCRYPTION_KEY: ""
