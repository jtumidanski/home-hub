    }

    # Recipe service
    location /api/v1/recipes {
        set $recipe_upstream http://recipe-service:8080;
        proxy_pass $recipe_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
