services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - account-service
      - productivity-service
      - weather-service
      - recipe-service

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    expose:
      - "80"

  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_KEY_ID=${JWT_KEY_ID:-home-hub-1}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-https://accounts.google.com}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:8080/api/v1/auth/callback/google}

  account-service:
    build:
      context: ../..
      dockerfile: services/account-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json

  productivity-service:
    build:
      context: ../..
      dockerfile: services/productivity-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json

  weather-service:
    build:
      context: ../..
      dockerfile: services/weather-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json
      - REFRESH_INTERVAL_MINUTES=${REFRESH_INTERVAL_MINUTES:-30}
      - CACHE_TTL_MINUTES=${CACHE_TTL_MINUTES:-30}

  recipe-service:
    build:
      context: ../..
      dockerfile: services/recipe-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json
