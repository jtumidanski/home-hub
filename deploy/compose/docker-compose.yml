services:
  nginx:
    container_name: hh-nginx
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - account-service
      - productivity-service
      - weather-service
      - recipe-service
      - calendar-service
      - package-service
      - category-service
      - shopping-service
      - tracker-service
      - workout-service

  frontend:
    container_name: hh-frontend
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    expose:
      - "80"

  auth-service:
    container_name: hh-auth
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_KEY_ID=${JWT_KEY_ID:-home-hub-1}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-https://accounts.google.com}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:8080/api/v1/auth/callback/google}

  account-service:
    container_name: hh-account
    build:
      context: ../..
      dockerfile: services/account-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json

  productivity-service:
    container_name: hh-productivity
    build:
      context: ../..
      dockerfile: services/productivity-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json

  weather-service:
    container_name: hh-weather
    build:
      context: ../..
      dockerfile: services/weather-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json
      - REFRESH_INTERVAL_MINUTES=${REFRESH_INTERVAL_MINUTES:-30}
      - CACHE_TTL_MINUTES=${CACHE_TTL_MINUTES:-30}

  calendar-service:
    container_name: hh-calendar
    build:
      context: ../..
      dockerfile: services/calendar-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json
      - GOOGLE_CALENDAR_CLIENT_ID=${GOOGLE_CALENDAR_CLIENT_ID}
      - GOOGLE_CALENDAR_CLIENT_SECRET=${GOOGLE_CALENDAR_CLIENT_SECRET}
      - CALENDAR_TOKEN_ENCRYPTION_KEY=${CALENDAR_TOKEN_ENCRYPTION_KEY}
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-15}

  package-service:
    container_name: hh-package
    build:
      context: ../..
      dockerfile: services/package-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json
      - USPS_CLIENT_ID=${USPS_CLIENT_ID}
      - USPS_CLIENT_SECRET=${USPS_CLIENT_SECRET}
      - UPS_CLIENT_ID=${UPS_CLIENT_ID}
      - UPS_CLIENT_SECRET=${UPS_CLIENT_SECRET}
      - FEDEX_API_KEY=${FEDEX_API_KEY}
      - FEDEX_SECRET_KEY=${FEDEX_SECRET_KEY}
      - FEDEX_SANDBOX=${FEDEX_SANDBOX:-false}
      - PACKAGE_TOKEN_ENCRYPTION_KEY=${PACKAGE_TOKEN_ENCRYPTION_KEY}
      - PACKAGE_POLL_INTERVAL_MINUTES=${PACKAGE_POLL_INTERVAL_MINUTES:-30}
      - PACKAGE_MAX_ACTIVE_PER_HOUSEHOLD=${PACKAGE_MAX_ACTIVE_PER_HOUSEHOLD:-25}

  recipe-service:
    container_name: hh-recipe
    build:
      context: ../..
      dockerfile: services/recipe-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json
      - CATEGORY_SERVICE_URL=http://category-service:8080

  category-service:
    container_name: hh-category
    build:
      context: ../..
      dockerfile: services/category-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json

  tracker-service:
    container_name: hh-tracker
    build:
      context: ../..
      dockerfile: services/tracker-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json

  workout-service:
    container_name: hh-workout
    build:
      context: ../..
      dockerfile: services/workout-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json

  shopping-service:
    container_name: hh-shopping
    build:
      context: ../..
      dockerfile: services/shopping-service/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=${DB_HOST:-postgres.home}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-home_hub}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-home_hub}
      - PORT=8080
      - JWKS_URL=http://auth-service:8080/api/v1/auth/.well-known/jwks.json
      - CATEGORY_SERVICE_URL=http://category-service:8080
      - RECIPE_SERVICE_URL=http://recipe-service:8080
