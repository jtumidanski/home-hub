name: Pull Request Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force build all services'
        required: false
        type: boolean
        default: false

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        if: ${{ !inputs.force_all }}
        uses: ./.github/actions/detect-changes

      - name: Force all services
        id: force
        if: ${{ inputs.force_all }}
        run: |
          echo "🚨 Force building all services"
          echo 'services=["svc-users","svc-tasks","svc-weather","svc-reminders","admin","kiosk"]' >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Set final outputs
        id: final
        run: |
          if [[ "${{ inputs.force_all }}" == "true" ]]; then
            echo "services=${{ steps.force.outputs.services }}" >> $GITHUB_OUTPUT
            echo "has_changes=${{ steps.force.outputs.has_changes }}" >> $GITHUB_OUTPUT
          else
            echo "services=${{ steps.detect.outputs.services }}" >> $GITHUB_OUTPUT
            echo "has_changes=${{ steps.detect.outputs.has_changes }}" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          tags: home-hub-${{ matrix.service }}:pr-${{ github.event.pull_request.number || 'manual' }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILD_DATE=${{ github.event.pull_request.updated_at || github.event.head_commit.timestamp }}
            VCS_REF=${{ github.event.pull_request.head.sha || github.sha }}

      - name: Build summary
        run: |
          echo "✅ Successfully built **${{ matrix.service }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`home-hub-${{ matrix.service }}:pr-${{ github.event.pull_request.number || 'manual' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.event.pull_request.head.sha || github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Pull Request Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.detect-changes.outputs.has_changes }}" == "true" ]]; then
            services='${{ needs.detect-changes.outputs.services }}'
            echo "**Services built**: \`$services\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [[ "${{ needs.build.result }}" == "success" ]]; then
              echo "✅ All builds succeeded" >> $GITHUB_STEP_SUMMARY
            elif [[ "${{ needs.build.result }}" == "failure" ]]; then
              echo "❌ Some builds failed - check logs above" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Build status: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ℹ️ No services changed - skipped build" >> $GITHUB_STEP_SUMMARY
          fi
