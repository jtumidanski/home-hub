name: Main Branch Publish

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to publish (comma-separated, empty for auto-detect)'
        required: false
        type: string

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.final.outputs.services }}
      has_changes: ${{ steps.final.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        if: ${{ !inputs.services }}
        uses: ./.github/actions/detect-changes

      - name: Manual service selection
        id: manual
        if: ${{ inputs.services }}
        run: |
          # Convert comma-separated string to JSON array
          services="${{ inputs.services }}"
          if [ -z "$services" ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            # Split by comma, trim whitespace, convert to JSON array
            json_array=$(echo "$services" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R . | jq -s -c .)
            echo "🎯 Manually selected services: $json_array"
            echo "services=$json_array" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Set final outputs
        id: final
        run: |
          if [[ -n "${{ inputs.services }}" ]]; then
            echo "services=${{ steps.manual.outputs.services }}" >> $GITHUB_OUTPUT
            echo "has_changes=${{ steps.manual.outputs.has_changes }}" >> $GITHUB_OUTPUT
          else
            echo "services=${{ steps.detect.outputs.services }}" >> $GITHUB_OUTPUT
            echo "has_changes=${{ steps.detect.outputs.has_changes }}" >> $GITHUB_OUTPUT
          fi

  build-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/home-hub-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Build summary
        run: |
          echo "## 📦 Published: **${{ matrix.service }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`ghcr.io/${{ github.repository_owner }}/home-hub-${{ matrix.service }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  /' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository_owner }}/home-hub-${{ matrix.service }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Publish Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, build-push]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# 🚀 Main Branch Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.detect-changes.outputs.has_changes }}" == "true" ]]; then
            services='${{ needs.detect-changes.outputs.services }}'
            echo "**Services published**: \`$services\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [[ "${{ needs.build-push.result }}" == "success" ]]; then
              echo "✅ All images published successfully to GHCR" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "View packages: https://github.com/${{ github.repository_owner }}?tab=packages" >> $GITHUB_STEP_SUMMARY
            elif [[ "${{ needs.build-push.result }}" == "failure" ]]; then
              echo "❌ Some builds failed - check logs above" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Build status: ${{ needs.build-push.result }}" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ℹ️ No services changed - skipped publish" >> $GITHUB_STEP_SUMMARY
          fi
