name: Main Branch

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/home-hub

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      docker-matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            auth:
              - 'services/auth-service/**'
              - 'shared/go/**'
            account:
              - 'services/account-service/**'
              - 'shared/go/**'
            calendar:
              - 'services/calendar-service/**'
              - 'shared/go/**'
            productivity:
              - 'services/productivity-service/**'
              - 'shared/go/**'
            weather:
              - 'services/weather-service/**'
              - 'shared/go/**'
            recipe:
              - 'services/recipe-service/**'
              - 'shared/go/**'
            category:
              - 'services/category-service/**'
              - 'shared/go/**'
            shopping:
              - 'services/shopping-service/**'
              - 'shared/go/**'
            package:
              - 'services/package-service/**'
              - 'shared/go/**'
            tracker:
              - 'services/tracker-service/**'
              - 'shared/go/**'
            workout:
              - 'services/workout-service/**'
              - 'shared/go/**'
            dashboard:
              - 'services/dashboard-service/**'
              - 'shared/go/**'
            frontend:
              - 'frontend/**'
      - name: Compute docker matrix
        id: matrix
        env:
          CHANGES: ${{ steps.changes.outputs.changes }}
        run: |
          ALL='[
            {"service":"auth-service","context":".","dockerfile":"services/auth-service/Dockerfile","changed":"auth"},
            {"service":"account-service","context":".","dockerfile":"services/account-service/Dockerfile","changed":"account"},
            {"service":"calendar-service","context":".","dockerfile":"services/calendar-service/Dockerfile","changed":"calendar"},
            {"service":"productivity-service","context":".","dockerfile":"services/productivity-service/Dockerfile","changed":"productivity"},
            {"service":"weather-service","context":".","dockerfile":"services/weather-service/Dockerfile","changed":"weather"},
            {"service":"recipe-service","context":".","dockerfile":"services/recipe-service/Dockerfile","changed":"recipe"},
            {"service":"category-service","context":".","dockerfile":"services/category-service/Dockerfile","changed":"category"},
            {"service":"shopping-service","context":".","dockerfile":"services/shopping-service/Dockerfile","changed":"shopping"},
            {"service":"package-service","context":".","dockerfile":"services/package-service/Dockerfile","changed":"package"},
            {"service":"tracker-service","context":".","dockerfile":"services/tracker-service/Dockerfile","changed":"tracker"},
            {"service":"workout-service","context":".","dockerfile":"services/workout-service/Dockerfile","changed":"workout"},
            {"service":"dashboard-service","context":".","dockerfile":"services/dashboard-service/Dockerfile","changed":"dashboard"},
            {"service":"frontend","context":"frontend","dockerfile":"frontend/Dockerfile","changed":"frontend"}
          ]'
          MATRIX=$(echo "$ALL" | jq -c --argjson changes "$CHANGES" 'map(select(.changed as $c | $changes | index($c)))')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.docker-matrix != '' && needs.detect-changes.outputs.docker-matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.docker-matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:main
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
