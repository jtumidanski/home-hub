events {
    worker_connections 1024;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Upstream definitions
    upstream oauth2_proxy_google {
        server hh-oauth2-google:4180;
    }

    upstream oauth2_proxy_github {
        server hh-oauth2-github:4181;
    }

    upstream svc_users {
        server hh-users:8080;
    }

    upstream svc_weather {
        server hh-weather:8080;
    }

    upstream svc_tasks {
        server hh-tasks:8080;
    }

    upstream admin_app {
        server hh-admin:5174;
    }

    upstream kiosk_app {
        server hh-kiosk:5173;
    }

    server {
        listen 80;
        server_name _;

        # Allow error_page in named locations (error handlers)
        recursive_error_pages on;

        # Increase buffer sizes for auth headers
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        large_client_header_buffers 4 32k;

        # ==========================================
        # OAuth2 Proxy Endpoints (Public - No Auth)
        # ==========================================

        # Generic OAuth2 endpoints (redirect to Google by default)
        location /oauth2/ {
            proxy_pass http://oauth2_proxy_google;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # Google OAuth endpoints (more specific, overrides above)
        location /oauth2/google/ {
            proxy_pass http://oauth2_proxy_google/oauth2/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # GitHub OAuth endpoints
        location /oauth2/github/ {
            proxy_pass http://oauth2_proxy_github/oauth2/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # ==========================================
        # API Routes (Protected with Dual Auth)
        # ==========================================

        # Weather service routes (more specific, matched first)
        location ~ ^/api/(admin/)?weather/ {
            # Try Google auth first
            auth_request /oauth2/google/auth;

            # If Google fails, try GitHub
            error_page 401 403 @weather_try_github;

            # Capture auth headers from oauth2-proxy
            auth_request_set $auth_user $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            auth_request_set $auth_groups $upstream_http_x_auth_request_groups;
            auth_request_set $auth_access_token $upstream_http_x_auth_request_access_token;

            # Pass auth headers to backend
            proxy_set_header X-Auth-Request-User $auth_user;
            proxy_set_header X-Auth-Request-Email $auth_email;
            proxy_set_header X-Auth-Request-Groups $auth_groups;
            proxy_set_header X-Auth-Request-Access-Token $auth_access_token;

            # Mark request as coming from nginx (for source validation)
            proxy_set_header X-Forwarded-By nginx-ingress;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Proxy to weather service
            proxy_pass http://svc_weather;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Weather service GitHub auth fallback
        location @weather_try_github {
            auth_request /oauth2/github/auth;
            # If GitHub auth also fails, return 401 JSON error
            error_page 401 403 = @api_error;

            # Capture auth headers from GitHub oauth2-proxy
            auth_request_set $auth_user $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            auth_request_set $auth_groups $upstream_http_x_auth_request_groups;
            auth_request_set $auth_access_token $upstream_http_x_auth_request_access_token;

            # Pass auth headers to backend
            proxy_set_header X-Auth-Request-User $auth_user;
            proxy_set_header X-Auth-Request-Email $auth_email;
            proxy_set_header X-Auth-Request-Groups $auth_groups;
            proxy_set_header X-Auth-Request-Access-Token $auth_access_token;
            proxy_set_header X-Forwarded-By nginx-ingress;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Proxy to weather service
            proxy_pass http://svc_weather;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Tasks service routes (more specific, matched before general API)
        location ~ ^/api/tasks {
            # Try Google auth first
            auth_request /oauth2/google/auth;

            # If Google fails, try GitHub
            error_page 401 403 @tasks_try_github;

            # Capture auth headers from oauth2-proxy
            auth_request_set $auth_user $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            auth_request_set $auth_groups $upstream_http_x_auth_request_groups;
            auth_request_set $auth_access_token $upstream_http_x_auth_request_access_token;

            # Pass auth headers to backend
            proxy_set_header X-Auth-Request-User $auth_user;
            proxy_set_header X-Auth-Request-Email $auth_email;
            proxy_set_header X-Auth-Request-Groups $auth_groups;
            proxy_set_header X-Auth-Request-Access-Token $auth_access_token;

            # Mark request as coming from nginx (for source validation)
            proxy_set_header X-Forwarded-By nginx-ingress;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Proxy to tasks service
            proxy_pass http://svc_tasks;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Tasks service GitHub auth fallback
        location @tasks_try_github {
            auth_request /oauth2/github/auth;
            # If GitHub auth also fails, return 401 JSON error
            error_page 401 403 = @api_error;

            # Capture auth headers from GitHub oauth2-proxy
            auth_request_set $auth_user $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            auth_request_set $auth_groups $upstream_http_x_auth_request_groups;
            auth_request_set $auth_access_token $upstream_http_x_auth_request_access_token;

            # Pass auth headers to backend
            proxy_set_header X-Auth-Request-User $auth_user;
            proxy_set_header X-Auth-Request-Email $auth_email;
            proxy_set_header X-Auth-Request-Groups $auth_groups;
            proxy_set_header X-Auth-Request-Access-Token $auth_access_token;
            proxy_set_header X-Forwarded-By nginx-ingress;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Proxy to tasks service
            proxy_pass http://svc_tasks;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # General API routes (fallback for other services)
        location /api/ {
            # Try Google auth first
            auth_request /oauth2/google/auth;

            # If Google fails, try GitHub
            error_page 401 403 @api_try_github;

            # Capture auth headers from oauth2-proxy
            auth_request_set $auth_user $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            auth_request_set $auth_groups $upstream_http_x_auth_request_groups;
            auth_request_set $auth_access_token $upstream_http_x_auth_request_access_token;

            # Pass auth headers to backend
            proxy_set_header X-Auth-Request-User $auth_user;
            proxy_set_header X-Auth-Request-Email $auth_email;
            proxy_set_header X-Auth-Request-Groups $auth_groups;
            proxy_set_header X-Auth-Request-Access-Token $auth_access_token;

            # Mark request as coming from nginx (for source validation)
            proxy_set_header X-Forwarded-By nginx-ingress;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Proxy to backend service
            proxy_pass http://svc_users;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # API GitHub auth fallback
        location @api_try_github {
            auth_request /oauth2/github/auth;
            # If GitHub auth also fails, return 401 JSON error
            error_page 401 403 = @api_error;

            # Capture auth headers from GitHub oauth2-proxy
            auth_request_set $auth_user $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            auth_request_set $auth_groups $upstream_http_x_auth_request_groups;
            auth_request_set $auth_access_token $upstream_http_x_auth_request_access_token;

            # Pass auth headers to backend
            proxy_set_header X-Auth-Request-User $auth_user;
            proxy_set_header X-Auth-Request-Email $auth_email;
            proxy_set_header X-Auth-Request-Groups $auth_groups;
            proxy_set_header X-Auth-Request-Access-Token $auth_access_token;
            proxy_set_header X-Forwarded-By nginx-ingress;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Proxy to backend service
            proxy_pass http://svc_users;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # API auth error handler
        location @api_error {
            return 401 '{"error": "Unauthorized"}';
            add_header Content-Type application/json;
        }

        # ==========================================
        # Admin UI (Protected with Dual Auth)
        # ==========================================

        # Admin static assets (no auth required for Next.js assets)
        location ~ ^/admin/(_next/|favicon\.ico) {
            # No auth required for static assets
            # Pass full path including /admin to Next.js
            proxy_pass http://admin_app;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /admin/ {
            # Try Google auth first
            auth_request /oauth2/google/auth;

            # If Google fails, try GitHub
            error_page 401 403 @admin_try_github;

            # Capture auth headers
            auth_request_set $auth_user $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

            # If authenticated, proxy to admin app (keep full path)
            proxy_pass http://admin_app;

            # Forward auth headers to app
            proxy_set_header X-Auth-Request-User $auth_user;
            proxy_set_header X-Auth-Request-Email $auth_email;
            proxy_set_header X-Auth-Request-Groups $auth_groups;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support (for Next.js HMR in development)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Admin root redirect (exact match for /admin without trailing slash)
        location = /admin {
            # Try Google auth first
            auth_request /oauth2/google/auth;

            # If Google fails, try GitHub
            error_page 401 403 @admin_try_github_root;

            # Capture auth headers
            auth_request_set $auth_user $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

            # If authenticated, proxy to admin app (keep full path)
            proxy_pass http://admin_app;

            # Forward auth headers to app
            proxy_set_header X-Auth-Request-User $auth_user;
            proxy_set_header X-Auth-Request-Email $auth_email;
            proxy_set_header X-Auth-Request-Groups $auth_groups;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Admin GitHub auth fallback (for paths with trailing slash)
        location @admin_try_github {
            auth_request /oauth2/github/auth;

            # Capture auth headers from GitHub oauth2-proxy
            auth_request_set $auth_user $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

            # If GitHub auth fails, show login page with 200 status
            error_page 401 403 = /login/admin;

            # If authenticated, proxy to admin app (keep full path)
            proxy_pass http://admin_app;

            # Forward auth headers to app
            proxy_set_header X-Auth-Request-User $auth_user;
            proxy_set_header X-Auth-Request-Email $auth_email;
            proxy_set_header X-Auth-Request-Groups $auth_groups;

            # Standard proxy headers
