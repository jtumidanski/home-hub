            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Admin login page (accessible route)
        location = /login/admin {
            root /usr/share/nginx/html/static;
            try_files /admin-login.html =404;
        }

        # ==========================================
        # Kiosk App (Protected with Dual Auth)
        # ==========================================

        # Kiosk static assets (no auth required for Next.js assets)
        location ~ ^/kiosk/(_next/|favicon\.ico) {
