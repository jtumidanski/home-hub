events {
    worker_connections 1024;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Upstream definitions
    upstream oauth2_proxy_google {
        server hh-oauth2-google:4180;
    }

    upstream oauth2_proxy_github {
        server hh-oauth2-github:4181;
    }

    upstream svc_users {
        server hh-users:8080;
    }

    upstream admin_app {
        server hh-admin:5174;
    }

    server {
        listen 80;
        server_name _;

        # Increase buffer sizes for auth headers
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        large_client_header_buffers 4 32k;

        # ==========================================
        # OAuth2 Proxy Endpoints (Public - No Auth)
        # ==========================================

        # Generic OAuth2 endpoints (redirect to Google by default)
        location /oauth2/ {
            proxy_pass http://oauth2_proxy_google;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # Google OAuth endpoints (more specific, overrides above)
        location /oauth2/google/ {
            proxy_pass http://oauth2_proxy_google/oauth2/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # GitHub OAuth endpoints
        location /oauth2/github/ {
            proxy_pass http://oauth2_proxy_github/oauth2/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # ==========================================
        # API Routes (Protected with Google Auth)
        # ==========================================

        location /api/ {
            # Auth subrequest to Google oauth2-proxy
            auth_request /oauth2/google/auth;

            # Capture auth headers from oauth2-proxy
            auth_request_set $auth_user $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            auth_request_set $auth_groups $upstream_http_x_auth_request_groups;
            auth_request_set $auth_access_token $upstream_http_x_auth_request_access_token;

            # Handle auth errors - redirect to Google login
            error_page 401 403 = @google_error_401;

            # Pass auth headers to backend
            proxy_set_header X-Auth-Request-User $auth_user;
            proxy_set_header X-Auth-Request-Email $auth_email;
            proxy_set_header X-Auth-Request-Groups $auth_groups;
            proxy_set_header X-Auth-Request-Access-Token $auth_access_token;

            # Mark request as coming from nginx (for source validation)
            proxy_set_header X-Forwarded-By nginx-ingress;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Proxy to backend service
            proxy_pass http://svc_users;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Google auth error handler
        location @google_error_401 {
            return 302 /oauth2/google/start?rd=$scheme://$http_host$request_uri;
        }

        # ==========================================
        # Admin UI (Protected with Google Auth)
        # ==========================================

        location /admin {
            # Proxy to oauth2-proxy which handles auth + proxying to admin app
            proxy_pass http://oauth2_proxy_google;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support (for Next.js HMR in development)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==========================================
        # Root and Static Assets (Protected with Google Auth)
        # ==========================================

        location / {
            # Proxy to oauth2-proxy which handles auth + proxying to admin app
            proxy_pass http://oauth2_proxy_google;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==========================================
        # Example: GitHub-Protected Route
        # ==========================================
        # Uncomment to enable a GitHub-protected route

        # location /github-protected/ {
        #     # Auth subrequest to GitHub oauth2-proxy
        #     auth_request /oauth2/github/auth;
        #
        #     # Capture auth headers
        #     auth_request_set $auth_user $upstream_http_x_auth_request_user;
        #     auth_request_set $auth_email $upstream_http_x_auth_request_email;
        #
        #     # Handle auth errors - redirect to GitHub login
        #     error_page 401 = @github_error_401;
        #
        #     # Pass auth headers
        #     proxy_set_header X-Auth-Request-User $auth_user;
        #     proxy_set_header X-Auth-Request-Email $auth_email;
        #     proxy_set_header X-Forwarded-By nginx-ingress;
        #
        #     # Standard proxy headers
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #
        #     # Proxy to backend
        #     proxy_pass http://svc_users;
        # }
        #
        # location @github_error_401 {
        #     return 302 /oauth2/github/start?rd=$scheme://$host$request_uri;
        # }

        # ==========================================
        # Health Check (Public - No Auth)
        # ==========================================

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ==========================================
        # Nginx Status (Public - No Auth)
        # ==========================================

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12; # Docker internal networks
            deny all;
        }
    }
}
