        # ==========================================
        # Health Check (Public - No Auth)
        # ==========================================

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ==========================================
        # Nginx Status (Public - No Auth)
        # ==========================================

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12; # Docker internal networks
            deny all;
        }
    }
}
