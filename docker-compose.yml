version: "3.8"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal-net
    container_name: hh-db
  svc-users:
    build:
      context: .
      dockerfile: apps/svc-users/Dockerfile
    environment:
      DB_HOST: hh-db
      DB_PORT: ${DB_PORT}
      DB_NAME: svc-users
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - internal-net
    container_name: hh-users
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: hh-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "4000:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
networks:
  internal-net:
    name: internal-net
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
