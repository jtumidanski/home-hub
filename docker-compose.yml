version: "3.8"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal-net
    container_name: hh-db
  svc-users:
    build:
      context: .
      dockerfile: apps/svc-users/Dockerfile
    environment:
      DB_HOST: hh-db
      DB_PORT: ${DB_PORT}
      DB_NAME: svc-users
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - internal-net
    container_name: hh-users
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: hh-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "4000:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - internal-net
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: hh-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_APP_ENV: production
    ports:
      - "5174:5174"
    networks:
      - internal-net
  oauth2-proxy-google:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: hh-oauth2-google
    restart: unless-stopped
    command:
      - --provider=google
      - --client-id=${GOOGLE_CLIENT_ID}
      - --client-secret=${GOOGLE_CLIENT_SECRET}
      - --cookie-secret=${GOOGLE_COOKIE_SECRET}
      - --cookie-name=_hub_google
      - --cookie-expire=168h
      - --cookie-refresh=1h
      - --cookie-secure=${COOKIE_SECURE:-false}
      - --cookie-domain=${COOKIE_DOMAIN:-homehub.localtest.me}
      - --redirect-url=${APP_BASE_URL:-http://homehub.localtest.me}/oauth2/google/callback
      - --email-domain=${GOOGLE_EMAIL_DOMAIN:-*}
      - --upstream=http://hh-admin:5174
      - --http-address=0.0.0.0:4180
      - --scope=openid email profile
    ports:
      - "4180:4180"
    networks:
      - internal-net
    depends_on:
      - admin
  oauth2-proxy-github:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: hh-oauth2-github
    restart: unless-stopped
    command:
      - --provider=github
      - --client-id=${GITHUB_CLIENT_ID}
      - --client-secret=${GITHUB_CLIENT_SECRET}
      - --cookie-secret=${GITHUB_COOKIE_SECRET}
      - --cookie-name=_hub_github
      - --cookie-expire=168h
      - --cookie-refresh=1h
      - --cookie-secure=${COOKIE_SECURE:-false}
      - --cookie-domain=${COOKIE_DOMAIN:-homehub.localtest.me}
      - --redirect-url=${APP_BASE_URL:-http://homehub.localtest.me}/oauth2/github/callback
      - --upstream=http://hh-admin:5174
      - --http-address=0.0.0.0:4181
      - --scope=user:email read:org
      - --email-domain=*
    environment:
      OAUTH2_PROXY_GITHUB_ORG: ${GITHUB_ORG:-}
    ports:
      - "4181:4181"
    networks:
      - internal-net
    depends_on:
      - admin
  nginx:
    image: nginx:1.25-alpine
    container_name: hh-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal-net
    depends_on:
      - oauth2-proxy-google
      - oauth2-proxy-github
      - svc-users
      - admin
networks:
  internal-net:
    name: internal-net
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
